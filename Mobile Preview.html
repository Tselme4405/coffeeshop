<!doctype html>
<html lang="mn"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Утасны харагдац</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:radial-gradient(circle at 50% 0%,#1c2026,#0c0e12);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
    padding:32px 16px;font-family:Inter,system-ui,sans-serif}
  .frame{width:393px;max-width:100%;height:820px;max-height:88vh;border-radius:46px;
    background:#0a0c10;border:1px solid #2a2e36;padding:12px;
    box-shadow:0 40px 90px rgba(0,0,0,.6), inset 0 0 0 2px #16191f}
  .screen{position:relative;width:100%;height:100%;border-radius:36px;overflow:hidden;background:#000}
  .notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:120px;height:26px;
    background:#000;border-radius:16px;z-index:5}
  iframe{width:100%;height:100%;border:0;display:block}
  .cap{color:#9aa3af;font-size:13px;letter-spacing:.02em}
</style></head>
<body>
  <div class="frame"><div class="screen">
    <div class="notch"></div>
    <iframe src="Coffee Stock Inventory.html"></iframe>
  </div></div>
  <div class="cap">📱 Утасны харагдац — дэлгэцэн дээр шууд ажиллана</div>
</body></html>
